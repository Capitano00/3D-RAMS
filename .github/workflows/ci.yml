name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Backend, evaluation, and frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Compile backend and scripts
        run: python -m compileall backend/app backend/tests scripts

      - name: Run backend tests
        run: python -m unittest discover -s backend/tests -q

      - name: Run deterministic demo evaluation
        run: python scripts/evaluate-demo.py
        env:
          ENABLE_BEDROCK: "false"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
