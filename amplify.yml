version: 1
applications:
  - appRoot: frontend
    customRules:
      - source: /case/<*>
        target: /index.html
        status: 200
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
