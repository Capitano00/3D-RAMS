<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">3D-RAMS hosted chat-to-brief architecture flow</title>
  <desc id="desc">A browser user sends a message through the hosted React UI to the conversation API. The backend records bounded session memory, can call a Bedrock conversation orchestrator first when enabled, then validates the route with deterministic safety and location gates before either answering conversationally or starting a guarded durable run with confirmation, tools, evidence, scene, briefing, and safety output. If Bedrock is disabled or fails, deterministic guarded routing remains the fallback.</desc>
  <defs>
    <style>
      .bg{fill:#f5f7f4}
      .band{fill:#ffffff;stroke:#d7e1dc;stroke-width:2}
      .browser{fill:#f7fbf9;stroke:#0b6f65;stroke-width:2}
      .runtime{fill:#eef6ff;stroke:#315c9b;stroke-width:2}
      .agent{fill:#eefaf6;stroke:#0b6f65;stroke-width:2}
      .data{fill:#fff8e7;stroke:#b7791f;stroke-width:2}
      .output{fill:#f7f8fa;stroke:#596873;stroke-width:2}
      .decision{fill:#ffffff;stroke:#8a5600;stroke-width:2}
      .label{font:700 18px Arial,sans-serif;fill:#15211d}
      .small{font:500 14px Arial,sans-serif;fill:#4f625c}
      .tiny{font:700 12px Arial,sans-serif;fill:#63746e;text-transform:uppercase}
      .arrow{stroke:#273549;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .thin{stroke:#4f625c;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7a8b85;stroke-width:2;stroke-dasharray:8 7;fill:none;marker-end:url(#arrow)}
      .note{font:700 13px Arial,sans-serif;fill:#33463f}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#273549"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="860"/>
  <text class="tiny" x="52" y="48">3D-RAMS hosted V3 / conversation-first path</text>
  <text class="label" x="52" y="78">Chat turn to evidence-backed 3D pre-visit review pack</text>
  <text class="small" x="52" y="104">The browser never calls Bedrock or holds AWS credentials. Conversation routing, validation, durable runs, tools, evidence, and safety stay server-side.</text>

  <rect class="band" x="44" y="138" width="278" height="620" rx="18"/>
  <text class="tiny" x="68" y="170">Browser boundary</text>
  <rect class="browser" x="72" y="202" width="220" height="74" rx="12"/>
  <text class="label" x="96" y="232">Hosted UI</text>
  <text class="small" x="96" y="254">Amplify React app</text>
  <rect class="browser" x="72" y="314" width="220" height="84" rx="12"/>
  <text class="label" x="96" y="344">Access session</text>
  <text class="small" x="96" y="366">shared code + alias</text>
  <rect class="browser" x="72" y="438" width="220" height="86" rx="12"/>
  <text class="label" x="96" y="468">Chat turn</text>
  <text class="small" x="96" y="490">message, follow-up, uploads</text>
  <rect class="browser" x="72" y="610" width="220" height="96" rx="12"/>
  <text class="label" x="96" y="640">Visualizer panels</text>
  <text class="small" x="96" y="662">chat, 3D scene, risk cards</text>
  <text class="small" x="96" y="682">evidence, trace, safety</text>

  <rect class="band" x="362" y="138" width="306" height="620" rx="18"/>
  <text class="tiny" x="386" y="170">API + memory boundary</text>
  <rect class="runtime" x="392" y="202" width="246" height="74" rx="12"/>
  <text class="label" x="418" y="232">API Gateway</text>
  <text class="small" x="418" y="254">HTTP API + CORS</text>
  <rect class="runtime" x="392" y="314" width="246" height="84" rx="12"/>
  <text class="label" x="418" y="344">Conversation API</text>
  <text class="small" x="418" y="366">POST /api/conversation/message</text>
  <rect class="runtime" x="392" y="438" width="246" height="86" rx="12"/>
  <text class="label" x="418" y="468">Lambda FastAPI</text>
  <text class="small" x="418" y="490">bounded session memory</text>
  <rect class="data" x="392" y="610" width="246" height="96" rx="12"/>
  <text class="label" x="418" y="640">DynamoDB trace</text>
  <text class="small" x="418" y="662">session memory + run state</text>
  <text class="small" x="418" y="682">CloudWatch logs in hosted mode</text>

  <rect class="band" x="708" y="138" width="332" height="620" rx="18"/>
  <text class="tiny" x="732" y="170">Conversation control boundary</text>
  <polygon class="decision" points="874,206 1004,254 874,302 744,254"/>
  <text class="label" x="782" y="248">Bedrock enabled</text>
  <text class="small" x="798" y="272">for chat routing?</text>
  <rect class="runtime" x="736" y="334" width="276" height="78" rx="12"/>
  <text class="label" x="762" y="364">Conversation orchestrator</text>
  <text class="small" x="762" y="386">classify or answer first pass</text>
  <rect class="agent" x="736" y="448" width="276" height="86" rx="12"/>
  <text class="label" x="762" y="478">Backend validation</text>
  <text class="small" x="762" y="500">safety, site signal, pending action</text>
  <text class="small" x="762" y="520">location confirmation gate</text>
  <polygon class="decision" points="874,570 1004,622 874,674 744,622"/>
  <text class="label" x="796" y="616">Route result</text>
  <text class="small" x="774" y="640">conversation or guarded run?</text>

  <rect class="band" x="1080" y="138" width="314" height="620" rx="18"/>
  <text class="tiny" x="1104" y="170">Run + AWS boundary</text>
  <rect class="output" x="1110" y="202" width="254" height="84" rx="12"/>
  <text class="label" x="1136" y="232">Conversation answer</text>
  <text class="small" x="1136" y="254">greeting, help, follow-up</text>
  <text class="small" x="1136" y="274">status, refusal, clarification</text>
  <rect class="data" x="1110" y="320" width="254" height="84" rx="12"/>
  <text class="label" x="1136" y="350">Confirm location</text>
  <text class="small" x="1136" y="372">postcode or coordinate candidate</text>
  <rect class="agent" x="1110" y="438" width="254" height="96" rx="12"/>
  <text class="label" x="1136" y="468">Guarded durable run</text>
  <text class="small" x="1136" y="490">planner, tools, reasoner</text>
  <text class="small" x="1136" y="510">compiler, evaluator, safety</text>
  <rect class="runtime" x="1110" y="568" width="254" height="76" rx="12"/>
  <text class="label" x="1136" y="598">Amazon Bedrock</text>
  <text class="small" x="1136" y="620">conversation + run path</text>
  <rect class="output" x="1110" y="678" width="254" height="60" rx="12"/>
  <text class="label" x="1136" y="708">Review pack output</text>

  <path class="arrow" d="M292 240 H392"/>
  <text class="note" x="316" y="228">GET app</text>
  <path class="arrow" d="M292 356 H392"/>
  <text class="note" x="310" y="342">session start</text>
  <path class="arrow" d="M292 482 H392"/>
  <text class="note" x="324" y="468">send message</text>
  <path class="arrow" d="M515 276 V314"/>
  <path class="arrow" d="M515 398 V438"/>
  <path class="arrow" d="M638 482 H744"/>
  <path class="arrow" d="M874 302 V334"/>
  <text class="note" x="896" y="328">enabled</text>
  <path class="thin" d="M744 254 H706 V490 H736"/>
  <text class="note" x="648" y="384">disabled/failure -> deterministic route</text>
  <path class="dash" d="M1004 254 H1110"/>
  <text class="note" x="1028" y="242">server-side Bedrock call</text>
  <path class="arrow" d="M874 412 V448"/>
  <path class="dash" d="M874 412 C938 412 976 598 1110 598"/>
  <text class="note" x="920" y="436">optional run model path</text>
  <path class="dash" d="M874 412 C820 412 794 394 774 370"/>
  <text class="note" x="756" y="328">first-pass answer or route</text>
  <path class="arrow" d="M874 534 V570"/>
  <path class="arrow" d="M1004 622 H1110"/>
  <text class="note" x="1024" y="608">validated conversation</text>
  <path class="arrow" d="M874 674 V704 H990 V362 H1110"/>
  <text class="note" x="898" y="692">candidate needs confirmation</text>
  <path class="thin" d="M1110 362 C1068 362 1050 362 1030 622 H1004"/>
  <text class="note" x="1040" y="394">user confirms before tools</text>
  <path class="arrow" d="M1004 648 H1084 V486 H1110"/>
  <text class="note" x="1022" y="474">new site task</text>
  <path class="dash" d="M736 490 C700 490 678 642 638 642"/>
  <path class="arrow" d="M1110 708 H638"/>
  <text class="note" x="748" y="698">scene, evidence, briefing, trace</text>
  <path class="arrow" d="M392 658 H292"/>
  <text class="note" x="318" y="648">render results</text>

  <rect class="output" x="62" y="786" width="1316" height="40" rx="10"/>
  <text class="small" x="84" y="812">Output stays inside a human-review safety boundary. Unsafe certification, approval-to-work, or emergency requests are blocked or constrained. The app does not claim certified RAMS or emergency guidance.</text>
</svg>
