<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">3D-RAMS hosted chat-to-brief architecture flow</title>
  <desc id="desc">A browser user opens the hosted 3D-RAMS chat UI, starts a shared-code session, sends a site visit request, and receives chat, 3D scene, evidence, trace, and safety output from a server-side agent running behind API Gateway and Lambda.</desc>
  <defs>
    <style>
      .bg{fill:#f5f7f4}
      .band{fill:#ffffff;stroke:#d7e1dc;stroke-width:2}
      .box{fill:#ffffff;stroke:#0b6f65;stroke-width:2;rx:12}
      .aws{fill:#eef6ff;stroke:#315c9b;stroke-width:2;rx:12}
      .data{fill:#fff8e7;stroke:#b7791f;stroke-width:2;rx:12}
      .safe{fill:#eefaf6;stroke:#0b6f65;stroke-width:2;rx:12}
      .label{font:700 20px Arial,sans-serif;fill:#15211d}
      .small{font:500 15px Arial,sans-serif;fill:#4f625c}
      .tiny{font:700 13px Arial,sans-serif;fill:#63746e;text-transform:uppercase}
      .arrow{stroke:#273549;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7a8b85;stroke-width:2;stroke-dasharray:8 7;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#273549"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="620"/>
  <text class="tiny" x="48" y="48">3D-RAMS hosted product path</text>
  <text class="label" x="48" y="78">Chat request to evidence-backed pre-visit review pack</text>
  <text class="small" x="48" y="104">Bedrock, uploads, state, and logs stay server-side. Browser users only see the product URL and shared access-code flow.</text>

  <rect class="band" x="40" y="132" width="300" height="408" rx="18"/>
  <text class="tiny" x="64" y="164">Browser boundary</text>
  <rect class="box" x="70" y="190" width="240" height="88"/>
  <text class="label" x="96" y="226">Hosted chat UI</text>
  <text class="small" x="96" y="252">Amplify React frontend</text>
  <rect class="box" x="70" y="326" width="240" height="112"/>
  <text class="label" x="96" y="362">Product panels</text>
  <text class="small" x="96" y="388">3D scene, risks, evidence</text>
  <text class="small" x="96" y="412">trace, confidence, safety</text>

  <rect class="band" x="386" y="132" width="396" height="408" rx="18"/>
  <text class="tiny" x="410" y="164">Hosted backend boundary</text>
  <rect class="aws" x="424" y="190" width="282" height="78"/>
  <text class="label" x="452" y="222">API Gateway</text>
  <text class="small" x="452" y="248">CORS, throttling, access route</text>
  <rect class="aws" x="424" y="314" width="282" height="78"/>
  <text class="label" x="452" y="346">Lambda + FastAPI</text>
  <text class="small" x="452" y="372">server-side credentials only</text>
  <rect class="safe" x="424" y="438" width="282" height="78"/>
  <text class="label" x="452" y="470">FieldBrief orchestrator</text>
  <text class="small" x="452" y="496">Strands-ready tools + safety gate</text>

  <rect class="band" x="828" y="132" width="380" height="408" rx="18"/>
  <text class="tiny" x="852" y="164">AWS services + evidence</text>
  <rect class="aws" x="858" y="190" width="286" height="72"/>
  <text class="label" x="886" y="222">Bedrock deploy target</text>
  <text class="small" x="886" y="246">not live until AWS Gate 2/3</text>
  <rect class="data" x="858" y="288" width="286" height="72"/>
  <text class="label" x="886" y="320">S3 upload target</text>
  <text class="small" x="886" y="344">not live until bucket configured</text>
  <rect class="data" x="858" y="386" width="286" height="72"/>
  <text class="label" x="886" y="418">DynamoDB trace target</text>
  <text class="small" x="886" y="442">not live until table configured</text>
  <rect class="data" x="858" y="484" width="286" height="72"/>
  <text class="label" x="886" y="516">CloudWatch target</text>
  <text class="small" x="886" y="540">not live until deployed</text>

  <path class="arrow" d="M310 234 H424"/>
  <path class="arrow" d="M565 268 V314"/>
  <path class="arrow" d="M565 392 V438"/>
  <path class="arrow" d="M706 476 H858"/>
  <path class="dash" d="M706 476 C770 430 780 230 858 226"/>
  <path class="dash" d="M706 476 C790 476 780 324 858 324"/>
  <path class="dash" d="M706 476 C800 500 780 422 858 422"/>
  <path class="dash" d="M706 476 C790 548 800 520 858 520"/>
  <path class="arrow" d="M424 354 C350 354 342 382 310 382"/>
  <text class="small" x="342" y="222">POST /api/session/start</text>
  <text class="small" x="342" y="250">POST /api/chat</text>
  <text class="small" x="312" y="424">chat + UI state</text>
</svg>
